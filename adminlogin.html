  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login – Al Nafay Fragrance</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Montserrat', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #111 0%, #2a1500 50%, #111 100%);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .login-card {
      background: #fff;
      border-radius: 16px;
      padding: 48px 44px;
      width: 100%; max-width: 420px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.4);
    }
    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-logo h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 700;
      color: #111;
    }
    .login-logo h1 span { color: #c8a96e; }
    .login-logo p { font-size: 13px; color: #888; margin-top: 4px; letter-spacing: 1px; text-transform: uppercase; }
    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 12px; font-weight: 600; color: #555; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #eee;
      border-radius: 8px;
      font-size: 14px;
      font-family: 'Montserrat', sans-serif;
      color: #222;
      transition: border-color 0.2s;
      outline: none;
    }
    input:focus { border-color: #c8a96e; }
    .error-msg {
      display: none;
      background: #fff0f0;
      border: 1px solid #ffcccc;
      color: #c0392b;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      text-align: center;
    }
    .error-msg.show { display: block; }
    .login-btn {
      width: 100%;
      padding: 14px;
      background: #c8a96e;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      font-family: 'Montserrat', sans-serif;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .login-btn:hover { background: #a07840; }
    .login-btn:active { transform: scale(0.98); }
    .hint {
      text-align: center;
      font-size: 11px;
      color: #bbb;
      margin-top: 20px;
    }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 16px;
      font-size: 13px;
      color: #c8a96e;
      text-decoration: none;
    }
    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <h1>Al Nafay <span>Fragrance</span></h1>
      <p>Admin Panel</p>
    </div>
    <form id="loginForm" onsubmit="doLogin(event)">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Enter your username" required autocomplete="username"/>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password"/>
      </div>
      <div class="error-msg" id="errorMsg">❌ Invalid username or password</div>
      <button type="submit" class="login-btn">Login to Admin Panel</button>
    </form>
    <p class="hint">Default: admin / alnafay@2025</p>
    <a href="../index.html" class="back-link">← Back to Website</a>
  </div>

  <script>
    // Simple credentials - change these in admin/dashboard.html
    const ADMIN_CREDENTIALS = {
      username: 'admin',
      password: 'alnafay@2025'
    };

    function doLogin(e) {
      e.preventDefault();
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value.trim();
      const err = document.getElementById('errorMsg');
      if (u === ADMIN_CREDENTIALS.username && p === ADMIN_CREDENTIALS.password) {
        localStorage.setItem('alnafay_admin_auth', 'true');
        window.location.href = 'dashboard.html';
      } else {
        err.classList.add('show');
        document.getElementById('password').value = '';
        setTimeout(() => err.classList.remove('show'), 3000);
      }
    }
    // If already logged in, redirect
    if (localStorage.getItem('alnafay_admin_auth') === 'true') {
      window.location.href = 'dashboard.html';
    }
  </script>
</body>
</html>
